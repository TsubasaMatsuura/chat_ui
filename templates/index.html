<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>入居者サポートAI — Demo</title>
    <meta name="description" content="賃貸入居者向けAIサポートチャットデモ">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-grid"></div>

    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <div class="header-icon">🏠</div>
                <div>
                    <h1 class="header-title">入居者サポートAI</h1>
                    <span class="header-subtitle">Tenant Support Assistant · Demo</span>
                </div>
            </div>
            <div class="header-right">
                <div class="status-badge" id="statusBadge">
                    <span class="status-dot"></span>
                    <span class="status-label">Live</span>
                </div>
                <button class="reset-btn" id="resetBtn" onclick="resetChat()">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2.5">
                        <path d="M1 4v6h6" />
                        <path d="M23 20v-6h-6" />
                        <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15" />
                    </svg>
                    リセット
                </button>
            </div>
        </header>

        <!-- Chat messages -->
        <main class="chat-area" id="chatArea">
            <div class="message-group ai" id="welcomeMsg">
                <div class="avatar ai-avatar">AI</div>
                <div class="msg-content">
                    <div class="bubble ai-bubble">
                        こんにちは！入居者サポートAIです。<br>
                        お部屋や設備に関するお困りごとをお気軽にご相談ください。
                    </div>
                    <div class="msg-time" id="welcomeTime"></div>
                </div>
            </div>
        </main>

        <!-- Typing indicator -->
        <div class="typing-wrap" id="typingWrap">
            <div class="avatar ai-avatar">AI</div>
            <div class="typing-bubbles">
                <span></span><span></span><span></span>
            </div>
        </div>

        <!-- Input -->
        <footer class="input-area">
            <div class="input-box" id="inputBox">
                <textarea id="msgInput" class="msg-input" placeholder="メッセージを入力..." rows="1"
                    onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2.5">
                        <line x1="22" y1="2" x2="11" y2="13" />
                        <polygon points="22 2 15 22 11 13 2 9 22 2" />
                    </svg>
                </button>
            </div>
            <p class="input-hint">Enter で送信 &nbsp;·&nbsp; Shift+Enter で改行</p>
        </footer>
    </div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>

</html>
